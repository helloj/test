<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd"><html xmlns="http://www.w3.org/1999/xhtml">
<head>
<link href="./abc2svg_files/edit-1.css" rel="stylesheet" type="text/css" />
<script src="./abc2svg_files/edit-1.js" type="text/javascript" async="true" />
<script src="./abc2svg_files/abc2svg-1.js" type="text/javascript" async="true" />
<script src="file:///C:/msys64/home/gnzgdu94/abc2svg-v1.23.0/pref.js" type="text/javascript" async="true" />
<title>ABC edit with abc2svg</title>
<script src="./abc2svg_files/snd-1.js" type="text/javascript" /><script src="./abc2svg_files/edit-it.js" type="text/javascript" /><script src="./abc2svg_files/err-it.js" type="text/javascript" /><style>.abcr {fill: #d00000; fill-opacity: 0; z-index: 15}</style></head>
<body ontouchstart="" bgcolor="#faf0e6" spellcheck="false">

<!-- left -->
<div id="dleft">

<!-- menu bar -->
    <ul id="nav">
	<li class="dropbutton"><span id="f">File</span>
		<ul class="droplinks">
		    <li><input type="file" id="abcfile" accept="*" style="display:none" onchange="loadtune()" />
			<label id="fl" for="abcfile">Carica file</label>
		    </li>
		    <li><span id="saveas">Salva il file</span></li>
		</ul>
	</li>
	<li class="dropbutton"><span id="pr">Preferenze</span>
		<ul class="droplinks">
			<li><span id="fs">Dimensione del font</span>
			    <input type="number" id="fontsize" min="10" max="20" value="14" onchange="setfont()" />
			</li>
			<li id="playdiv1" style="display: list-item;">
				<span id="sful">URL del Soundfont</span>
				 <input id="sfu" type="text" maxlength="120" size="50" onblur="set_sfu(this.value)" />
			</li>
			<li id="playdiv3" style="display: list-item;">
				<span id="gv">Volume</span>
				 <input id="gvol" type="range" min="1" max="10" value="7" onchange="set_vol(this.value / 10)" />
				<span id="gvl" value="7.00">0.70</span>
			</li>
			<li id="playdiv4" style="display: list-item;">
				<span id="sp">Velocità</span>
				 <input id="spv" type="range" min="1" max="20" value="10" step=".5" onchange="set_speed(this.value)" />
				<span id="spvl">1</span>
			</li>
		</ul>
	</li>
	<li class="dropbutton"><span id="lg">Lingua</span>
		<ul class="droplinks">
		<li onclick="loadlang(&apos;de&apos;)">Deutsch</li>
		<li onclick="loadlang(&apos;en&apos;)">English</li>
		<li onclick="loadlang(&apos;fr&apos;)">Français</li>
		<li onclick="loadlang(&apos;it&apos;)">Italiano</li>
		<li onclick="loadlang(&apos;pt_BR&apos;)">Português do Brasil</li>
		</ul>
	</li>
	<li class="dropbutton"><span id="h">Aiuto</span>
		<ul class="droplinks">
			<li id="ha" onclick="popshow(&apos;help&apos;, true)">Aiuto</li>
			<li><a id="df" target="_blank" href="http://moinejf.free.fr/abcm2ps-doc/features.html">abc2svg features</a>
			</li>
			<li><a id="dp" target="_blank" href="http://moinejf.free.fr/abcm2ps-doc/index.html">abc2svg parameters</a>
			</li>
			<li id="a" onclick="popshow(&apos;about&apos;, true)">A proposito</li>
		</ul>
	</li>
    </ul>
<br />

<!-- buttons -->
<p>
<span id="b">File ABC:</span>
<input id="s0" type="button" style="display: inline; background-color: #80ff80" value="(noname)" />
<input id="s1" type="button" style="display: none; background-color: #ffd0d0" value="" />
<span id="er" onclick="popshow(&apos;errlist&apos;, true)" style="display: none; background: #ff8080">Errori</span>

<!-- ABC source in textarea (main and include) -->
</p>
<textarea id="source" rows="40" cols="73" wrap="off" style="font: 14px monospace" ondrop="drop(event)" ondragenter="drag_enter(event)" oninput="src_change()" />
<textarea id="src1" rows="40" cols="73" wrap="off" style="font: 14px monospace; display: none" ondrop="drop(event)" ondragenter="drag_enter(event)" oninput="src_change()" />
</div>

<!-- right - needed for the scrollbars -->
<div id="dright">

<!-- context menu -->
<div id="ctxMenu" title="Suonare">
	<ul class="droplinks">
<!-- 'All' does not work anymore
	<li id="cmpa" onclick="play_tune(-1)" style="display:none">All</li>
 -->
	<li id="cmpt" onclick="play_tune(0)">Brano</li>
	<li id="cmps" onclick="play_tune(1)">Selezione</li>
	<li id="cmpl" onclick="play_tune(2)">Loop</li>
	<li id="cmpc" onclick="play_tune(3)">Continua</li>
	</ul>
</div>

<!-- rendering area -->
<div id="target">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" width="8.3in" height="2in" viewBox="0 0 595 144">
<text x="250" y="100" font-family="serif" font-size="12">(void)</text>
</svg>
</div>
</div>

<!-- error popup window -->
<div id="errlist" class="popup" style="width: 500px">
<div class="close" onclick="popshow(&apos;errlist&apos;)">x</div>
<div id="diverr">
</div>
</div>

<!-- help popup window -->
<div id="help" class="popup" style="width: 550px">
<div class="close" onclick="popshow(&apos;help&apos;)">x</div>
<ul id="hlp">
<li>Opzioni:
    <ul>
	<li>scrivere direttamente codice ABC nell'area di testo, oppure</li>
	<li>incollare codice ABC nell'area di testo, oppure</li>
	<li>caricare un file ABC locale (menu 'ABC | Carica file'), oppure</li>
	<li>trascinare un file locale da file manager
		o del testo selezionato nell'area di testo.</li>
    </ul></li>
	<li>Puoi modificare il codice ABC nell'area di testo;<br />
	dopo 2 secondi la musica viene visualizzata o aggiornata.</li>
	<li>L'opzione 'Stampa' del browser stampa la musica.</li>
<li>Puoi selezionare parte di un brano sia nell'area di testo	(fai click e seleziona), o nell'area dello spartito.<br />
	In questo caso, un click su un elemento musicale inizia la selezione,	mentre un click col tasto destro la termina.<br />	Inoltre, se il browser può suonare la musica, un click col tasto destro	al di fuori della musica mostra il menu Suonare.</li></ul>
</div>

<!-- about popup window -->
<div id="about" class="popup" style="width: 350px">
<div class="close" onclick="popshow(&apos;about&apos;)">x</div>
<p id="abc2svg">abc2svg-v1.23.0 (2026-03-18)</p>

</div>
